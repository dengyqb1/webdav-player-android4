name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Install Android SDK 33
      run: |
        ls "$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms"
        # Use sdkmanager to install required SDK
        SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
        if [ ! -f "$SDKMANAGER" ]; then
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/16.0/bin/sdkmanager"
        fi
        if [ ! -f "$SDKMANAGER" ]; then
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/tools/bin/sdkmanager"
        fi
        echo "Using sdkmanager: $SDKMANAGER"
        SKIP_JDK_VERSION_CHECK=1 yes | "$SDKMANAGER" --licenses || true
        SKIP_JDK_VERSION_CHECK=1 "$SDKMANAGER" "platforms;android-33" "build-tools;33.0.0"

    - name: Build Debug APK
      run: |
        # Generate proper gradle wrapper
        gradle wrapper --gradle-version 7.6.3
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: webdav-player-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Show debug info
      if: failure()
      run: |
        find app/build -name "*.apk" 2>/dev/null
        cat app/build/outputs/logs/manifest-merger-debug-report.txt 2>/dev/null || echo "No manifest report"
        find app/build -name "*.log" 2>/dev/null | head -5 | while read f; do echo "=== $f ==="; tail -50 "$f"; done
