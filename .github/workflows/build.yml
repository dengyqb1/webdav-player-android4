name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle 7.6.3
      run: |
        curl -sL "https://services.gradle.org/distributions/gradle-7.6.3-bin.zip" -o /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt
        echo "/opt/gradle-7.6.3/bin" >> $GITHUB_PATH

    - name: Install Android SDK 33
      run: |
        SDKMANAGER=$(find $ANDROID_HOME/cmdline-tools -name sdkmanager 2>/dev/null | head -1)
        echo "Using: $SDKMANAGER"
        SKIP_JDK_VERSION_CHECK=1 yes | "$SDKMANAGER" --licenses || true
        SKIP_JDK_VERSION_CHECK=1 "$SDKMANAGER" "platforms;android-33" "build-tools;33.0.0"

    - name: Build Debug APK
      run: |
        gradle wrapper --gradle-version 7.6.3
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: webdav-player-debug
        path: app/build/outputs/apk/debug/*.apk
