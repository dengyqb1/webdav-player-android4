name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Check Android SDK
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME"
        ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms"
        ls -la "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "No build-tools"

    - name: Install Android SDK 33
      run: |
        if [ -d "$ANDROID_HOME/cmdline-tools/latest/bin" ]; then
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-33" "build-tools;33.0.0"
        elif [ -d "$ANDROID_HOME/cmdline-tools/16.0/bin" ]; then
          SKIP_JDK_VERSION_CHECK=1 yes | "$ANDROID_HOME/cmdline-tools/16.0/bin/sdkmanager" --licenses || true
          SKIP_JDK_VERSION_CHECK=1 "$ANDROID_HOME/cmdline-tools/16.0/bin/sdkmanager" "platforms;android-33" "build-tools;33.0.0"
        else
          echo "No cmdline-tools found, downloading..."
          mkdir -p "$ANDROID_HOME/cmdline-tools/"
          curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o /tmp/cmdline.zip
          unzip -q /tmp/cmdline.zip -d "$ANDROID_HOME/cmdline-tools/"
          mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-33" "build-tools;33.0.0"
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50

    - name: Upload Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: webdav-player-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Show failure logs
      if: failure()
      run: |
        cat app/build/outputs/logs/manifest-merger-debug-report.txt 2>/dev/null || echo "No manifest report"
        find app/build -name "*.log" 2>/dev/null | head -5 | while read f; do echo "=== $f ==="; tail -30 "$f"; done
